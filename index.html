<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Feed</title>
<style>
  :root {
    --bg: #f6f2ea;
    --card: #ffffff;
    --ink: #2b2620;
    --accent: #b5432f;
    --muted: #8a8177;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: "Songti SC", "Noto Serif SC", Georgia, serif;
    min-height: 100vh;
  }
  header {
    text-align: center;
    padding: 48px 20px 32px;
    border-bottom: 1px solid #e3dcd0;
  }
  header h1 {
    font-size: 2rem;
    letter-spacing: 0.35em;
    text-indent: 0.35em;
  }
  header h1 .dot { color: var(--accent); }
  header p {
    margin-top: 10px;
    color: var(--muted);
    font-size: 0.85rem;
    letter-spacing: 0.15em;
  }
  #tabs {
    display: flex;
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
    padding: 24px 20px 0;
  }
  .tab {
    border: 1px solid #d8cfc0;
    background: transparent;
    color: var(--muted);
    font-family: inherit;
    font-size: 0.9rem;
    padding: 7px 20px;
    border-radius: 999px;
    cursor: pointer;
    letter-spacing: 0.1em;
  }
  .tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  #gallery {
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 20px 80px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 28px;
  }
  .card {
    background: var(--card);
    border-radius: 6px;
    overflow: hidden;
    box-shadow: 0 2px 12px rgba(43,38,32,0.08);
    cursor: pointer;
    transition: transform .18s ease, box-shadow .18s ease;
    display: flex;
    flex-direction: column;
  }
  .card:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 24px rgba(43,38,32,0.14);
  }
  .thumb {
    width: 100%;
    height: 320px;
    overflow: hidden;
    background: #eee7db;
  }
  .thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top;
    display: block;
  }
  .meta { padding: 14px 16px 16px; }
  .meta .title { font-size: 1.05rem; font-weight: 600; }
  .meta .date {
    margin-top: 4px;
    color: var(--muted);
    font-size: 0.8rem;
    letter-spacing: 0.08em;
  }
  #empty {
    text-align: center;
    color: var(--muted);
    padding: 80px 20px;
    display: none;
  }
  /* Lightbox */
  #lightbox {
    position: fixed;
    inset: 0;
    background: rgba(25,22,18,0.92);
    display: none;
    justify-content: center;
    align-items: flex-start;
    overflow-y: auto;
    z-index: 100;
    padding: 40px 16px;
  }
  #lightbox.open { display: flex; }
  #lightbox img {
    max-width: min(760px, 100%);
    border-radius: 4px;
    display: block;
  }
  #lightbox .close {
    position: fixed;
    top: 18px;
    right: 24px;
    color: #fff;
    font-size: 2rem;
    cursor: pointer;
    line-height: 1;
    font-family: sans-serif;
  }
  footer {
    text-align: center;
    color: var(--muted);
    font-size: 0.75rem;
    padding: 0 0 40px;
    letter-spacing: 0.1em;
  }
</style>
</head>
<body>
<header>
  <h1>JY <span class="dot">·</span> Daily Feed</h1>
  <p id="count"></p>
</header>
<nav id="tabs"></nav>
<main id="gallery"></main>
<div id="empty">暂无内容</div>
<div id="lightbox"><span class="close" onclick="closeLb()">×</span><img id="lb-img" alt=""></div>
<footer>Daily Feed</footer>
<script src="manifest.js"></script>
<script>
  const feed = (window.FEED || []).slice().sort((a, b) => b.date.localeCompare(a.date));
  const gallery = document.getElementById('gallery');
  const tabsEl = document.getElementById('tabs');
  const lb = document.getElementById('lightbox');
  const lbImg = document.getElementById('lb-img');
  let current = '全部';

  const cats = ['全部', ...new Set(feed.map(i => i.title))];
  for (const c of cats) {
    const b = document.createElement('button');
    b.className = 'tab' + (c === current ? ' active' : '');
    b.textContent = c;
    b.onclick = () => {
      current = c;
      document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.textContent === c));
      renderGallery();
    };
    tabsEl.appendChild(b);
  }

  if (feed.length === 0) {
    document.getElementById('empty').style.display = 'block';
  } else {
    document.getElementById('count').textContent = `共 ${feed.length} 篇 · 最近更新 ${feed[0].date}`;
  }

  function renderGallery() {
    gallery.innerHTML = '';
    const shown = current === '全部' ? feed : feed.filter(i => i.title === current);
    for (const item of shown) {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="thumb"><img loading="lazy" src="${item.file}" alt="${item.title}"></div>
        <div class="meta">
          <div class="title">${item.title}</div>
          <div class="date">${item.date}</div>
        </div>`;
      card.onclick = () => { lbImg.src = item.file; lb.classList.add('open'); };
      gallery.appendChild(card);
    }
  }
  renderGallery();

  function closeLb() { lb.classList.remove('open'); lbImg.src = ''; }
  lb.onclick = (e) => { if (e.target === lb) closeLb(); };
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeLb(); });
</script>
</body>
</html>
